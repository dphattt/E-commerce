name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: BE typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BE
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: BE/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  frontend:
    name: FE lint + typecheck + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FE
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: FE/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
